name: Deploy Vorschau zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Wird vom Storyblok-Webhook ausgeloest (Story veroeffentlicht) -> Rebuild.
  repository_dispatch:
    types: [storyblok-publish]

# Rechte fuer das Deployment auf GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Parallel laufende Deployments vermeiden (laufendes nicht abbrechen)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Statisch bauen (Unterpfad fuer Pages)
        env:
          # Repo-Name als Unterpfad -> https://<user>.github.io/wohlfahrt/
          NEXT_PUBLIC_BASE_PATH: /wohlfahrt
          # Storyblok-Inhalte beim Build laden (published). Ohne Secret
          # faellt der Build automatisch auf die lokalen Defaults zurueck.
          STORYBLOK_TOKEN: ${{ secrets.STORYBLOK_TOKEN }}
          STORYBLOK_REGION: ${{ secrets.STORYBLOK_REGION || 'eu' }}
          STORYBLOK_VERSION: published
          # Bridge-Token (oeffentlich) – optional, fuer den Visual Editor.
          NEXT_PUBLIC_STORYBLOK_TOKEN: ${{ secrets.NEXT_PUBLIC_STORYBLOK_TOKEN }}
          NEXT_PUBLIC_STORYBLOK_REGION: ${{ secrets.STORYBLOK_REGION || 'eu' }}
        run: npm run build

      - name: Jekyll deaktivieren (_next-Ordner nicht ignorieren)
        run: touch out/.nojekyll

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
